<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saray Patisserie — Bespoke Artisan Cakes</title>
<meta name="description" content="Türkiye'nin en seçkin pastacılarından lüks, ısmarlama pastalar.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0908;--card:#141210;--border:#2a2520;
--primary-h:43;--primary-s:52%;--primary-l:53%;
--primary:hsl(43,52%,53%);--primary-fg:#0a0908;
--fg:#f5f0e8;--muted:#8a8070;--secondary:#1c1a16;
--radius:16px;
}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}
h1,h2,h3,.display{font-family:'Playfair Display',serif}
.label{font-size:10px;text-transform:uppercase;letter-spacing:2px;font-weight:600;color:var(--primary)}
.loc-overlay{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.loc-overlay h1{font-size:28px;font-style:italic;margin-bottom:8px;text-align:center}
.loc-overlay p{color:var(--muted);font-size:13px;margin-bottom:32px;text-align:center}
.loc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:400px;max-height:50vh;overflow-y:auto;padding:4px}
.loc-btn{padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--fg);font-size:13px;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all .2s;text-align:left}
.loc-btn:hover,.loc-btn.active{border-color:var(--primary);background:hsla(43,52%,53%,.08)}
.loc-back{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;margin-bottom:16px;font-family:'Montserrat',sans-serif}
.app{min-height:100vh;padding-bottom:80px}
.topbar{padding:16px 24px 12px;display:flex;align-items:center;justify-content:space-between}
.topbar-loc{display:flex;align-items:center;gap:8px;cursor:pointer;background:none;border:none;color:var(--fg)}
.topbar-loc small{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);display:block}
.topbar-loc span{font-size:13px;font-weight:600}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--secondary);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);font-family:'Playfair Display',serif;font-style:italic;color:var(--primary);font-size:12px}
.hero{margin:8px 24px 0;border-radius:20px;overflow:hidden;position:relative;aspect-ratio:16/10}
.hero img{width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,var(--bg),rgba(10,9,8,.4),transparent)}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:24px}
.hero-content h2{font-size:24px;font-style:italic;line-height:1.2;margin-top:8px}
.hero-btn{margin-top:16px;padding:12px 24px;background:var(--primary);color:var(--primary-fg);border:none;border-radius:50px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;font-family:'Montserrat',sans-serif}
.section-header{padding:0 24px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-header h2{font-size:20px}
.see-all{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--primary);font-weight:600;cursor:pointer;background:none;border:none}
.carousel{display:flex;gap:16px;padding:0 24px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.carousel::-webkit-scrollbar{display:none}
.carousel .card{min-width:85vw;max-width:400px;scroll-snap-align:center;flex-shrink:0}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card img{width:100%;aspect-ratio:4/5;object-fit:cover}
.card.grid-card img{aspect-ratio:1/1}
.card-body{padding:16px}
.card-body h3{font-size:16px;margin-bottom:4px;font-family:'Playfair Display',serif}
.card-body .desc{font-size:12px;color:var(--muted);margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;gap:12px;font-size:11px;color:var(--muted);margin-bottom:16px}
.card-meta svg{width:14px;height:14px;vertical-align:middle;margin-right:2px}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-vendor{font-size:11px;color:var(--muted)}
.card-price{font-size:18px;font-family:'Playfair Display',serif;color:var(--primary)}
.card-order{padding:10px 20px;background:var(--primary);color:var(--primary-fg);border:none;border-radius:50px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;cursor:pointer;font-family:'Montserrat',sans-serif}
.card.grid-card .card-body{padding:12px}
.card.grid-card .card-body h3{font-size:13px}
.card.grid-card .card-price{font-size:15px}
.rating-badge{position:absolute;top:12px;right:12px;background:rgba(10,9,8,.7);backdrop-filter:blur(8px);padding:4px 8px;border-radius:50px;font-size:11px;display:flex;align-items:center;gap:4px}
.rating-badge .star{color:var(--primary)}
.cat-bar{display:flex;gap:8px;padding:12px 24px;overflow-x:auto}
.cat-bar::-webkit-scrollbar{display:none}
.cat-btn{padding:8px 18px;border-radius:50px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;white-space:nowrap;font-family:'Montserrat',sans-serif;transition:all .2s}
.cat-btn.active{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 24px}
.product-grid .card{position:relative}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(20,18,16,.9);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 max(10px,env(safe-area-inset-bottom));z-index:50}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:'Montserrat',sans-serif;font-size:9px;text-transform:uppercase;letter-spacing:1px}
.nav-item.active{color:var(--primary)}
.nav-item svg{width:20px;height:20px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const PRODUCTS=[
{id:"1",name:"Altın Yaprak Ganache",desc:"24 ayar yenilebilir altın yaprakla süslenmiş, %70 kakao Belçika çikolatası ganache",price:2450,img:"https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=600&h=750&fit=crop",vendor:"Maison Dorée Patisserie",rating:4.9,time:"90 dk",cat:"Özel Tasarım",min:8,featured:true},
{id:"2",name:"Red Velvet Royale",desc:"Kırmızı kadife dokusu, krem peynir dolgulu, altın tozu detaylı",price:1850,img:"https://images.unsplash.com/photo-1616541823729-00fe0aacd32c?w=600&h=750&fit=crop",vendor:"Bebek Artisan Bakery",rating:4.8,time:"60 dk",cat:"Klasik",min:4},
{id:"3",name:"Geometric Elegance",desc:"5 katlı düğün pastası, geometrik altın çizgiler, el yapımı şeker hamuruyla kaplanmış",price:8900,img:"https://images.unsplash.com/photo-1535254973040-607b474cb50d?w=600&h=750&fit=crop",vendor:"Saray Grand Atelier",rating:5.0,time:"Randevulu",cat:"Düğün",min:20,featured:true},
{id:"4",name:"Baroque Truffle",desc:"Barok stil çikolata oymaları, altın tozu ve kakao nibs ile süslenmiş",price:2100,img:"https://images.unsplash.com/photo-1606890737304-57a1ca8a5b62?w=600&h=750&fit=crop",vendor:"Nişantaşı Çikolata Evi",rating:4.7,time:"75 dk",cat:"Çikolata",min:6},
{id:"5",name:"Rose Macaron Tower",desc:"El yapımı gül aromalı makaron kulesi, rose gold detaylar",price:3200,img:"https://images.unsplash.com/photo-1569864358642-9d1684040f43?w=600&h=750&fit=crop",vendor:"Pâtisserie Lumière",rating:4.9,time:"120 dk",cat:"Özel Tasarım",min:12},
{id:"6",name:"Tarte aux Fruits d'Or",desc:"Mevsim meyveli tart, altın yaprak dekorasyonlu, tereyağlı hamur",price:950,img:"https://images.unsplash.com/photo-1488477181946-6428a0291777?w=600&h=750&fit=crop",vendor:"Bebek Artisan Bakery",rating:4.8,time:"45 dk",cat:"Tart",min:4}
];
const CATEGORIES=["Tümü","Özel Tasarım","Klasik","Düğün","Çikolata","Tart"];
const CITIES=[
{name:"İstanbul",districts:["Beşiktaş","Kadıköy","Bakırköy","Şişli","Üsküdar","Beyoğlu","Sarıyer","Ataşehir"]},
{name:"Ankara",districts:["Çankaya","Keçiören","Yenimahalle","Mamak","Etimesgut"]},
{name:"İzmir",districts:["Konak","Karşıyaka","Bornova","Buca","Alsancak"]},
{name:"Bursa",districts:["Osmangazi","Nilüfer","Yıldırım","Mudanya"]},
{name:"Antalya",districts:["Muratpaşa","Konyaaltı","Kepez","Lara"]},
{name:"Adana",districts:["Seyhan","Çukurova","Yüreğir","Sarıçam"]}
];
const state={step:"city",city:"",district:"",activeCat:"Tümü",tab:"home"};
const starSVG='<svg viewBox="0 0 24 24" fill="currentColor" class="star"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
const clockSVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
const usersSVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>';
const pinSVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>';
function fmt(n){return n.toLocaleString('tr-TR')}

function render(){
  const app=document.getElementById('app');
  if(!state.district){app.innerHTML=renderLocation()}
  else{app.innerHTML=renderMain()}
}

function renderLocation(){
  if(state.step==='city'){
    return '<div class="loc-overlay"><p class="label" style="margin-bottom:16px">SARAY PATISSERIE</p><h1 class="display" style="font-style:italic">Teslimat Konumunuz</h1><p>Lütfen ilinizi seçin</p><div class="loc-grid">'+CITIES.map(function(c){return '<button class="loc-btn" data-city="'+c.name+'">'+c.name+'</button>'}).join('')+'</div></div>';
  }
  var city=CITIES.find(function(c){return c.name===state.city});
  return '<div class="loc-overlay"><button class="loc-back" data-back>← '+state.city+' değiştir</button><h1 class="display" style="font-style:italic">'+state.city+'</h1><p>İlçenizi seçin</p><div class="loc-grid">'+city.districts.map(function(d){return '<button class="loc-btn" data-district="'+d+'">'+d+'</button>'}).join('')+'</div></div>';
}

function renderMain(){
  var featured=PRODUCTS.filter(function(p){return p.featured});
  var filtered=state.activeCat==='Tümü'?PRODUCTS:PRODUCTS.filter(function(p){return p.cat===state.activeCat});
  return '<div class="app"><div class="topbar"><button class="topbar-loc" data-changeloc>'+pinSVG+'<div><small>Teslimat Adresi</small><span>'+state.district+', '+state.city+'</span></div></button><div class="avatar">S</div></div><div class="hero"><img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=800&h=500&fit=crop" alt="Saray Patisserie"><div class="hero-overlay"></div><div class="hero-content"><p class="label">SARAY APPROVED</p><h2>Bespoke Artistry,<br>Delivered.</h2><button class="hero-btn">Koleksiyonu Keşfet</button></div></div><section style="margin-top:32px"><div class="section-header"><h2>Öne Çıkanlar</h2><button class="see-all">Tümünü Gör</button></div><div class="carousel">'+featured.map(function(p){return renderCard(p,'hero')}).join('')+'</div></section><section style="margin-top:32px"><div class="section-header" style="flex-direction:column;align-items:flex-start;gap:4px"><h2>Master Pâtissiers</h2><p style="font-size:13px;color:var(--muted)">Saray onaylı zanaatkârlardan seçmeler</p></div><div class="cat-bar">'+CATEGORIES.map(function(c){return '<button class="cat-btn'+(state.activeCat===c?' active':'')+'" data-cat="'+c+'">'+c+'</button>'}).join('')+'</div><div class="product-grid">'+filtered.map(function(p){return renderCard(p,'grid')}).join('')+'</div></section><nav class="bottom-nav">'+navItem('home','Ana Sayfa','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>')+navItem('search','Keşfet','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>')+navItem('orders','Siparişler','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>')+navItem('profile','Profil','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>')+'</nav></div>';
}

function renderCard(p,type){
  if(type==='hero'){
    return '<div class="card"><img src="'+p.img+'" alt="'+p.name+'" loading="lazy"><div class="card-body"><span class="label">'+p.cat+'</span><h3>'+p.name+'</h3><p class="desc">'+p.desc+'</p><div class="card-meta"><span>'+starSVG+' '+p.rating+'</span><span>'+clockSVG+' '+p.time+'</span><span>'+usersSVG+' Min '+p.min+' kişi</span></div><div class="card-footer"><div><p class="card-vendor">'+p.vendor+'</p><p class="card-price">₺'+fmt(p.price)+'</p></div><button class="card-order">Sipariş Ver</button></div></div></div>';
  }
  return '<div class="card grid-card"><div style="position:relative"><img src="'+p.img+'" alt="'+p.name+'" loading="lazy"><div class="rating-badge">'+starSVG+' '+p.rating+'</div></div><div class="card-body"><h3>'+p.name+'</h3><p class="card-vendor">'+p.vendor+'</p><div class="card-footer" style="margin-top:8px"><p class="card-price">₺'+fmt(p.price)+'</p><span style="font-size:10px;color:var(--muted)">'+clockSVG+' '+p.time+'</span></div></div></div>';
}

function navItem(id,label,icon){
  return '<button class="nav-item'+(state.tab===id?' active':'')+'" data-tab="'+id+'">'+icon+'<span>'+label+'</span></button>';
}

document.getElementById('app').addEventListener('click',function(e){
  var btn=e.target.closest('[data-city],[data-district],[data-back],[data-changeloc],[data-cat],[data-tab]');
  if(!btn)return;
  if(btn.dataset.city!==undefined){state.step='district';state.city=btn.dataset.city;render()}
  else if(btn.dataset.district!==undefined){state.district=btn.dataset.district;render()}
  else if(btn.dataset.back!==undefined){state.step='city';state.city='';render()}
  else if(btn.dataset.changeloc!==undefined){state.district='';state.step='city';state.city='';render()}
  else if(btn.dataset.cat!==undefined){state.activeCat=btn.dataset.cat;render()}
  else if(btn.dataset.tab!==undefined){state.tab=btn.dataset.tab;render()}
});

render();
</script>
</body>
</html>
