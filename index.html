<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARAY PATİSSERİE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;800&family=Montserrat:wght@300;400;500;600;700;800&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --black: #0F0E0C;
            --gold: #D4AF37;
            --white: #FCFBF8;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--black);
            color: var(--white);
        }
        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: rgba(15, 14, 12, 0.98);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 1000;
            border-bottom: 0.5px solid rgba(212, 175, 55, 0.3);
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #D4AF37, #F4E5A1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        select, button {
            background: rgba(212, 175, 55, 0.05);
            border: 0.5px solid rgba(212, 175, 55, 0.3);
            color: var(--white);
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
        }
        .hero {
            margin-top: 70px;
            height: 600px;
            position: relative;
        }
        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s;
            background-size: cover;
            background-position: center;
        }
        .slide.active { opacity: 1; }
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(15, 14, 12, 0.75), rgba(15, 14, 12, 0.3));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            font-weight: 800;
            margin-bottom: 24px;
        }
        .hero p {
            font-size: 22px;
            margin-bottom: 40px;
        }
        .btn-hero {
            background: linear-gradient(135deg, #D4AF37, #F4E5A1);
            color: var(--black);
            border: none;
            padding: 22px 60px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.4);
        }
        .dots {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
        }
        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
        }
        .dot.active {
            background: var(--gold);
            width: 50px;
            border-radius: 7px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 5%;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 28px;
        }
        .card {
            background: rgba(212, 175, 55, 0.05);
            border: 0.5px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px;
            overflow: hidden;
            transition: transform 0.4s;
        }
        .card:hover {
            transform: translateY(-12px);
        }
        .card-img {
            width: 100%;
            aspect-ratio: 1;
            background: #fff;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-body {
            padding: 24px;
        }
        h3 {
            font-size: 22px;
            font-weight: 800;
            margin: 12px 0;
        }
        .price {
            font-size: 28px;
            font-weight: 800;
            color: var(--gold);
        }
        .btns {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }
        .btn {
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            border: none;
        }
        .btn-sec {
            background: rgba(212, 175, 55, 0.05);
            color: var(--white);
            border: 0.5px solid rgba(212, 175, 55, 0.3);
        }
        .btn-pri {
            background: var(--gold);
            color: var(--black);
        }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            h1 { font-size: 42px; }
        }
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo">SARAY</div>
        <select id="city" onchange="filter()">
            <option value="">📍 Şehir</option>
            <option value="istanbul">İstanbul</option>
            <option value="ankara">Ankara</option>
            <option value="izmir">İzmir</option>
        </select>
        <button>🛍 Sepet (<span id="count">0</span>)</button>
    </div>

    <div class="hero">
        <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=1920&q=90')">
            <div class="overlay">
                <h1>Türkiye'nin En <span style="color:#D4AF37">Elite</span> Pasta Deneyimi</h1>
                <p>81 ilden seçkin pastaneler</p>
                <button class="btn-hero" onclick="openStudio()">🎨 PASTANI SEN TASARLA</button>
            </div>
        </div>
        <div class="dots">
            <div class="dot active"></div>
        </div>
    </div>

    <div class="container">
        <div class="grid" id="grid"></div>
    </div>

    <script>
        const products = [
            {id:1,name:'Premium Çikolata',city:'istanbul',price:850,img:'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=800&q=80'},
            {id:2,name:'Tropikal Meyveli',city:'ankara',price:750,img:'https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=800&q=80'},
            {id:3,name:'Vanilyalı Rüya',city:'istanbul',price:680,img:'https://images.unsplash.com/photo-1588195538326-c5b1e9f80a1b?w=800&q=80'}
        ];
        let cart = [], city = '';

        function render() {
            let list = city ? products.filter(p => p.city === city) : products;
            document.getElementById('grid').innerHTML = list.map(p => `
                <div class="card">
                    <div class="card-img"><img src="${p.img}"></div>
                    <div class="card-body">
                        <h3>${p.name}</h3>
                        <div class="price">₺${p.price}</div>
                        <div class="btns">
                            <button class="btn btn-sec">✏️ Düzenle</button>
                            <button class="btn btn-pri" onclick="add(${p.id})">Ekle</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function add(id) {
            cart.push(id);
            document.getElementById('count').textContent = cart.length;
            alert('✅ Eklendi!');
        }

        function filter() {
            city = document.getElementById('city').value;
            render();
        }

        function openStudio() {
            const path = window.location.pathname.split('/')[1];
            window.open(`/${path}/studio.html`, '_blank');
        }

        render();
    </script>
</body>
</html>
