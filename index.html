<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>SARAY PATİSSERİE — Türkiye'nin Elite Pasta Marketi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;800&family=Montserrat:wght@300;400;500;600;700;800&family=Dancing+Script:wght@400;700&family=Great+Vibes&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --black: #0F0E0C;
            --gold: #D4AF37;
            --white: #FCFBF8;
            --glass: rgba(212, 175, 55, 0.05);
            --border: 0.5px solid rgba(212, 175, 55, 0.3);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--black);
            color: var(--white);
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        h1, h2, h3, .logo {
            font-family: 'Playfair Display', serif;
        }

        /* ===== TOP NAVIGATION ===== */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(15, 14, 12, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #D4AF37, #F4E5A1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .top-icons {
            display: flex;
            gap: 16px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--glass);
            border: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .icon-btn:active {
            transform: scale(0.9);
        }

        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--gold);
            color: var(--black);
            border-radius: 10px;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: 800;
        }

        /* ===== LOCATION SELECTOR ===== */
        .location-bar {
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            background: var(--black);
            border-bottom: var(--border);
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            z-index: 999;
        }

        .location-bar select {
            flex: 1;
            background: var(--glass);
            border: var(--border);
            color: var(--white);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
        }

        .location-bar select option {
            background: var(--black);
            color: var(--white);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            margin-top: 128px;
            padding: 0 20px 20px;
        }

        /* ===== HERO BANNER ===== */
        .hero-banner {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(15, 14, 12, 0.8)),
                        url('https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=1600&q=90');
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            padding: 60px 30px;
            text-align: center;
            margin-bottom: 32px;
            border: var(--border);
        }

        .hero-banner h1 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .hero-banner p {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 24px;
        }

        .btn-hero {
            background: var(--gold);
            color: var(--black);
            border: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
        }

        .btn-hero:active {
            transform: scale(0.95);
        }

        /* ===== CATEGORIES ===== */
        .categories {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            margin-bottom: 32px;
            padding-bottom: 8px;
            scrollbar-width: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-pill {
            background: var(--glass);
            border: var(--border);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-pill.active {
            background: var(--gold);
            color: var(--black);
        }

        /* ===== PRODUCTS GRID ===== */
        .products-grid {
            display: grid;
            gap: 20px;
            grid-template-columns: 1fr;
        }

        .product-card {
            background: var(--glass);
            border: var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1;
            position: relative;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .product-card:active .product-image img {
            transform: scale(1.05);
        }

        .product-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--gold);
            color: var(--black);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
        }

        .product-info {
            padding: 16px;
        }

        .vendor-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .vendor-name {
            font-size: 12px;
            opacity: 0.7;
            font-weight: 500;
        }

        .vendor-rating {
            font-size: 12px;
            color: var(--gold);
            font-weight: 600;
        }

        .product-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .product-features {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .feature-tag {
            background: rgba(212, 175, 55, 0.1);
            border: 0.5px solid rgba(212, 175, 55, 0.3);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 22px;
            font-weight: 800;
            color: var(--gold);
        }

        .delivery-time {
            font-size: 12px;
            opacity: 0.7;
        }

        .btn-add {
            background: var(--gold);
            color: var(--black);
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add:active {
            transform: scale(0.9);
        }

        /* ===== BOTTOM NAVIGATION ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(15, 14, 12, 0.95);
            backdrop-filter: blur(20px);
            border-top: var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            padding: 0 20px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.3s;
            padding: 8px 12px;
        }

        .nav-item.active {
            color: var(--gold);
        }

        .nav-item:active {
            transform: scale(0.9);
        }

        .nav-icon {
            font-size: 24px;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 600;
        }

        /* ===== CART DRAWER ===== */
        .cart-drawer {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            background: var(--black);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            border: var(--border);
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1500;
            max-height: 70vh;
            overflow-y: auto;
        }

        .cart-drawer.open {
            bottom: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 800;
        }

        .btn-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--glass);
            border: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
        }

        .cart-item {
            background: var(--glass);
            border: var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
        }

        .cart-item-image {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
        }

        .cart-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-total {
            margin-top: 20px;
            padding-top: 20px;
            border-top: var(--border);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .total-row.grand {
            font-size: 20px;
            font-weight: 800;
            color: var(--gold);
        }

        .btn-primary {
            width: 100%;
            background: var(--gold);
            color: var(--black);
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        /* ===== RESPONSIVE ===== */
        @media (min-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .bottom-nav {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- TOP NAVIGATION -->
    <div class="top-nav">
        <div class="logo">SARAY</div>
        <div class="top-icons">
            <div class="icon-btn" onclick="alert('👤 Giriş özelliği yakında!')">
                <span id="authIcon">👤</span>
            </div>
            <div class="icon-btn" onclick="toggleCart()">
                🛍
                <span class="badge" id="cartBadge">0</span>
            </div>
        </div>
    </div>

    <!-- LOCATION SELECTOR -->
    <div class="location-bar">
        <select id="citySelect" onchange="loadDistricts()">
            <option value="">📍 Şehir Seçin</option>
            <option value="istanbul">İstanbul</option>
            <option value="ankara">Ankara</option>
            <option value="izmir">İzmir</option>
            <option value="bursa">Bursa</option>
            <option value="antalya">Antalya</option>
            <option value="adana">Adana</option>
        </select>
        <select id="districtSelect">
            <option value="">İlçe</option>
        </select>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <!-- HERO BANNER -->
        <div class="hero-banner">
            <h1>Türkiye'nin <span style="color: var(--gold)">En Elite</span> Pasta Deneyimi</h1>
            <p>81 ilden seçkin pastaneler, 4 kişiden başlayan özel tasarımlar</p>
            <button class="btn-hero" onclick="openCakeStudio()">🎨 Pastanı Sen Tasarla</button>
        </div>

        <!-- CATEGORIES -->
        <div class="categories" id="categories">
            <div class="category-pill active" onclick="filterCategory('all')">Hepsi</div>
            <div class="category-pill" onclick="filterCategory('chocolate')">Çikolata</div>
            <div class="category-pill" onclick="filterCategory('fruit')">Meyveli</div>
            <div class="category-pill" onclick="filterCategory('classic')">Klasik</div>
        </div>

        <!-- PRODUCTS GRID -->
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home')">
            <div class="nav-icon">🏠</div>
            <div class="nav-label">Ana Sayfa</div>
        </div>
        <div class="nav-item" onclick="switchTab('search')">
            <div class="nav-icon">🔍</div>
            <div class="nav-label">Keşfet</div>
        </div>
        <div class="nav-item" onclick="openCakeStudio()">
            <div class="nav-icon">🎨</div>
            <div class="nav-label">Tasarla</div>
        </div>
        <div class="nav-item" onclick="switchTab('orders')">
            <div class="nav-icon">📦</div>
            <div class="nav-label">Siparişler</div>
        </div>
        <div class="nav-item" onclick="alert('👤 Hesap özelliği yakında!')">
            <div class="nav-icon">👤</div>
            <div class="nav-label">Hesap</div>
        </div>
    </div>

    <!-- CART DRAWER -->
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h2 class="modal-title">🛍 Sepetim</h2>
            <div class="btn-close" onclick="toggleCart()">✕</div>
        </div>
        <div id="cartItems"></div>
        <div class="cart-total">
            <div class="total-row">
                <span>Ara Toplam</span>
                <span id="subtotal">₺0</span>
            </div>
            <div class="total-row">
                <span>Teslimat</span>
                <span id="deliveryFee">₺50</span>
            </div>
            <div class="total-row grand">
                <span>TOPLAM</span>
                <span id="grandTotal">₺0</span>
            </div>
            <button class="btn-primary" onclick="checkout()">Ödeme Yap</button>
        </div>
    </div>

    <script>
        // ===== STATE MANAGEMENT =====
        const state = {
            cart: [],
            selectedCity: '',
            selectedDistrict: '',
            currentCategory: 'all'
        };

        // ===== PRODUCT DATABASE =====
        const products = [
            { 
                id: 1, 
                name: 'Premium Çikolata Delight', 
                vendor: 'Şef Ahmet Pastanesi',
                vendorId: 'vendor_001',
                vendorRating: '4.9', 
                city: 'istanbul', 
                district: 'kadikoy',
                price: 2850, 
                category: 'chocolate', 
                features: ['24K Altın', 'Belçika Çikolata'], 
                delivery: '90 dk', 
                image: 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=800&q=80',
                minPerson: 4
            },
            { 
                id: 2, 
                name: 'Tropikal Meyveli Özel', 
                vendor: 'Elit Cake House',
                vendorId: 'vendor_002',
                vendorRating: '4.8', 
                city: 'ankara', 
                district: 'cankaya',
                price: 2100, 
                category: 'fruit', 
                features: ['Taze Meyve', 'Premium Krema'], 
                delivery: '75 dk', 
                image: 'https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=800&q=80',
                minPerson: 4
            },
            { 
                id: 3, 
                name: 'Klasik Vanilyalı Rüya', 
                vendor: 'Bursa Pasta Atölyesi',
                vendorId: 'vendor_003',
                vendorRating: '4.7', 
                city: 'bursa', 
                district: 'nilufer',
                price: 1950, 
                category: 'classic', 
                features: ['Bourbon Vanilya', 'El Yapımı'], 
                delivery: '60 dk', 
                image: 'https://images.unsplash.com/photo-1588195538326-c5b1e9f80a1b?w=800&q=80',
                minPerson: 4
            },
            { 
                id: 4, 
                name: 'Muz Karamel Sensation', 
                vendor: 'Antalya Patisserie',
                vendorId: 'vendor_004',
                vendorRating: '4.9', 
                city: 'antalya', 
                district: 'konyaalti',
                price: 2400, 
                category: 'chocolate', 
                features: ['Organik Muz', 'Toffee Krema'], 
                delivery: '80 dk', 
                image: 'https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=800&q=80',
                minPerson: 4
            },
            { 
                id: 5, 
                name: 'Berry Explosion Mix', 
                vendor: 'İzmir Cake Studio',
                vendorId: 'vendor_005',
                vendorRating: '4.8', 
                city: 'izmir', 
                district: 'bornova',
                price: 2650, 
                category: 'fruit', 
                features: ['Çilek', 'Ahududu', 'Yaban Mersini'], 
                delivery: '70 dk', 
                image: 'https://images.unsplash.com/photo-1621303837174-89787a7d4729?w=800&q=80',
                minPerson: 4
            },
            { 
                id: 6, 
                name: 'Frambuazlı Klasik', 
                vendor: 'Adana Lezzet Evi',
                vendorId: 'vendor_006',
                vendorRating: '4.6', 
                city: 'adana', 
                district: 'seyhan',
                price: 2200, 
                category: 'classic', 
                features: ['Frambuaz Püresi', 'Hafif Krema'], 
                delivery: '85 dk', 
                image: 'https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?w=800&q=80',
                minPerson: 4
            }
        ];

        // ===== DISTRICT DATA =====
        const districts = {
            istanbul: ['Kadıköy', 'Beşiktaş', 'Şişli', 'Bakırköy', 'Üsküdar'],
            ankara: ['Çankaya', 'Keçiören', 'Mamak', 'Yenimahalle', 'Etimesgut'],
            izmir: ['Bornova', 'Karşıyaka', 'Konak', 'Buca', 'Balçova'],
            bursa: ['Nilüfer', 'Osmangazi', 'Yıldırım', 'Görükle', 'Mudanya'],
            antalya: ['Konyaaltı', 'Muratpaşa', 'Kepez', 'Döşemealtı', 'Aksu'],
            adana: ['Seyhan', 'Yüreğir', 'Çukurova', 'Sarıçam', 'Karaisalı']
        };

        // ===== INITIALIZATION =====
        window.addEventListener('DOMContentLoaded', () => {
            renderProducts();
        });

        // ===== PRODUCT RENDERING =====
        function renderProducts(category = 'all', city = '') {
            const grid = document.getElementById('productsGrid');
            let filtered = products;

            if (category !== 'all') {
                filtered = filtered.filter(p => p.category === category);
            }

            if (city) {
                filtered = filtered.filter(p => p.city === city);
            }

            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="product-image">
                        <img src="${p.image}" alt="${p.name}" loading="lazy">
                        <div class="product-badge">HAZIR TESLİMAT</div>
                    </div>
                    <div class="product-info">
                        <div class="vendor-info">
                            <span class="vendor-name">${p.vendor}</span>
                            <span class="vendor-rating">★ ${p.vendorRating}</span>
                        </div>
                        <h3 class="product-name">${p.name}</h3>
                        <div class="product-features">
                            ${p.features.map(f => `<span class="feature-tag">${f}</span>`).join('')}
                        </div>
                        <div class="product-footer">
                            <div>
                                <div class="product-price">₺${p.price.toLocaleString('tr-TR')}</div>
                                <div class="delivery-time">⏱ ${p.delivery}</div>
                            </div>
                            <button class="btn-add" onclick="quickAdd(${p.id})">Ekle</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ===== CATEGORY FILTER =====
        function filterCategory(category) {
            state.currentCategory = category;
            document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts(category, state.selectedCity);
        }

        // ===== LOCATION HANDLING =====
        function loadDistricts() {
            const city = document.getElementById('citySelect').value;
            const districtSelect = document.getElementById('districtSelect');
            
            state.selectedCity = city;
            
            if (city && districts[city]) {
                districtSelect.innerHTML = '<option value="">İlçe Seçin</option>' + 
                    districts[city].map(d => `<option value="${d.toLowerCase()}">${d}</option>`).join('');
                districtSelect.disabled = false;
            } else {
                districtSelect.innerHTML = '<option value="">Önce şehir seçin</option>';
                districtSelect.disabled = true;
            }

            renderProducts(state.currentCategory, city);
        }

        // ===== CART MANAGEMENT =====
        function quickAdd(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            state.cart.push({
                ...product,
                quantity: 1,
                customizations: null
            });

            updateCart();
            showNotification('✅ Sepete eklendi!');
        }

        function updateCart() {
            const badge = document.getElementById('cartBadge');
            const itemsContainer = document.getElementById('cartItems');
            
            badge.textContent = state.cart.length;

            if (state.cart.length === 0) {
                itemsContainer.innerHTML = '<p style="text-align: center; opacity: 0.7; padding: 40px 0;">Sepetiniz boş</p>';
                document.getElementById('subtotal').textContent = '₺0';
                document.getElementById('grandTotal').textContent = '₺50';
                return;
            }

            itemsContainer.innerHTML = state.cart.map((item, index) => `
                <div class="cart-item">
                    <div class="cart-item-image">
                        <img src="${item.image}" alt="${item.name}">
                    </div>
                    <div class="cart-item-info">
                        <div style="font-weight: 700; margin-bottom: 4px;">${item.name}</div>
                        <div style="font-size: 12px; opacity: 0.7; margin-bottom: 8px;">${item.vendor}</div>
                        <div style="font-weight: 800; color: var(--gold);">₺${item.price.toLocaleString('tr-TR')}</div>
                    </div>
                    <button class="btn-close" onclick="removeFromCart(${index})" style="position: static;">✕</button>
                </div>
            `).join('');

            const subtotal = state.cart.reduce((sum, item) => sum + item.price, 0);
            const deliveryFee = 50;
            const total = subtotal + deliveryFee;

            document.getElementById('subtotal').textContent = `₺${subtotal.toLocaleString('tr-TR')}`;
            document.getElementById('grandTotal').textContent = `₺${total.toLocaleString('tr-TR')}`;
        }

        function removeFromCart(index) {
            state.cart.splice(index, 1);
            updateCart();
        }

        function toggleCart() {
            const drawer = document.getElementById('cartDrawer');
            drawer.classList.toggle('open');
        }

        // ===== OPEN CAKE STUDIO =====
        function openCakeStudio() {
            const studioURL = 'https://saraypatisserie16-oss.github.io/saray-patisserie-web/cake-studio.html';
            window.open(studioURL, '_blank', 'width=1400,height=900');
        }

        // ===== NOTIFICATIONS =====
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style = `
                position: fixed;
                top: 80px;
                left: 50%;
                transform: translateX(-50%);
                background: var(--gold);
                color: var(--black);
                padding: 16px 24px;
                border-radius: 50px;
                font-weight: 800;
                z-index: 3000;
                animation: slideDown 0.3s;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideUp 0.3s';
                setTimeout(() => notification.remove(), 300);
            }, 2000);
        }

        // ===== TAB SWITCHING =====
        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            if (tab === 'home') {
                renderProducts();
            }
        }

        // ===== CHECKOUT =====
        function checkout() {
            if (state.cart.length === 0) {
                showNotification('⚠️ Sepetiniz boş!');
                return;
            }

            const orderData = {
                orderId: 'ORD_' + Date.now(),
                items: state.cart.map(item => ({
                    productId: item.id,
                    vendorId: item.vendorId,
                    name: item.name,
                    price: item.price,
                    quantity: item.quantity
                })),
                deliveryAddress: {
                    city: state.selectedCity,
                    district: state.selectedDistrict
                },
                totalAmount: state.cart.reduce((sum, item) => sum + item.price, 0) + 50,
                status: 'pending',
                createdAt: new Date().toISOString()
            };

            console.log('📦 ORDER PACKAGE:', JSON.stringify(orderData, null, 2));
            
            showNotification('🎉 Siparişiniz alındı!');
            state.cart = [];
            updateCart();
            toggleCart();
        }
    </script>
</body>
</html>
