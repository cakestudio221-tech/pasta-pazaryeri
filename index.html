<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARAY PATİSSERİE — Türkiye'nin Elite Pasta Marketi</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;800&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #0F0E0C;
            --gold: #D4AF37;
            --white: #FCFBF8;
            --glass: rgba(212, 175, 55, 0.05);
            --border: rgba(212, 175, 55, 0.3);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--black);
            color: var(--white);
            line-height: 1.6;
        }

        /* NAVIGATION */
        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            background: rgba(15, 14, 12, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 1000;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #D4AF37, #F4E5A1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-center {
            display: flex;
            gap: 24px;
        }

        .nav-right {
            display: flex;
            gap: 20px;
        }

        select, button {
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--white);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Montserrat', sans-serif;
        }

        button:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--gold);
        }

        .btn-primary {
            background: var(--gold);
            color: var(--black);
            border: none;
        }

        .btn-primary:hover {
            background: #F4E5A1;
        }

        /* HERO */
        .hero {
            margin-top: 80px;
            padding: 120px 5% 80px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 800;
            margin-bottom: 24px;
            line-height: 1.2;
        }

        .hero p {
            font-size: 20px;
            opacity: 0.8;
            max-width: 700px;
            margin: 0 auto 40px;
        }

        .btn-hero {
            background: linear-gradient(135deg, #D4AF37, #F4E5A1);
            color: var(--black);
            border: none;
            padding: 20px 50px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.3);
        }

        .btn-hero:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(212, 175, 55, 0.5);
        }

        /* CONTAINER */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 5%;
        }

        .section-header {
            margin-bottom: 40px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.7;
        }

        /* PRODUCTS GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 32px;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--gold), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.2);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 24px;
        }

        .vendor {
            font-size: 13px;
            opacity: 0.6;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .rating {
            color: var(--gold);
            font-size: 14px;
            font-weight: 700;
        }

        h3 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .description {
            font-size: 15px;
            opacity: 0.75;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .specs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 32px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }

        .spec {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .spec-label {
            font-size: 12px;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .spec-value {
            font-size: 15px;
            font-weight: 700;
            color: var(--gold);
        }

        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .tag {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .price-section {
            display: flex;
            flex-direction: column;
        }

        .price-label {
            font-size: 12px;
            opacity: 0.6;
            margin-bottom: 4px;
        }

        .price {
            font-size: 32px;
            font-weight: 800;
            color: var(--gold);
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }

        .btn-secondary {
            background: var(--glass);
            color: var(--white);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(212, 175, 55, 0.15);
        }

        .btn-add {
            background: var(--gold);
            color: var(--black);
        }

        .btn-add:hover {
            background: #F4E5A1;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            h1 {
                font-size: 48px;
            }
            
            h2 {
                font-size: 32px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .specs {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="logo">SARAY</div>
        <div class="nav-center">
            <select id="city" onchange="filter()">
                <option value="">📍 Tüm Şehirler</option>
                <option value="istanbul">İstanbul</option>
                <option value="ankara">Ankara</option>
                <option value="izmir">İzmir</option>
                <option value="bursa">Bursa</option>
                <option value="antalya">Antalya</option>
                <option value="adana">Adana</option>
            </select>
        </div>
        <div class="nav-right">
            <button>👤 Giriş Yap</button>
            <button>🛍 Sepet (<span id="count">0</span>)</button>
        </div>
    </nav>

    <div class="hero">
        <h1>Türkiye'nin En <span style="color: var(--gold)">Elite</span> Pasta Deneyimi</h1>
        <p>81 ilden seçkin pastaneler • Profesyonel 3D tasarım stüdyosu • Minimum 4 kişilik özel tasarımlar</p>
        <button class="btn-hero" onclick="openStudio()">🎨 PASTANI SEN TASARLA</button>
    </div>

    <div class="container">
        <div class="section-header">
            <h2>Hazır Lüks Modeller</h2>
            <p class="subtitle">Seçkin pastanelerimizin özel koleksiyonları</p>
        </div>

        <div class="grid" id="grid"></div>
    </div>

    <script>
        const products = [
            {
                id: 1,
                name: 'Premium Çikolata Delight',
                vendor: 'Şef Ahmet Pastanesi',
                rating: '4.9',
                city: 'istanbul',
                price: 850,
                description: 'Belçika çikolatası ile hazırlanan, 24 ayar altın varak süslemeli özel tasarım pasta. El yapımı krema ile kaplanmış, premium lezzet deneyimi.',
                minPerson: 4,
                flavor: 'Çikolata',
                coating: 'Ganache',
                tags: ['24K Altın', 'Belçika Çikolata', 'El Yapımı', 'Premium']
            },
            {
                id: 2,
                name: 'Tropikal Meyveli Özel',
                vendor: 'Elit Cake House',
                rating: '4.8',
                city: 'ankara',
                price: 750,
                description: 'Taze tropikal meyveler ve premium krema ile hazırlanan, ferah ve lezzetli özel pasta. Mevsimin en taze meyveleriyle süslenir.',
                minPerson: 4,
                flavor: 'Vanilya',
                coating: 'Krema',
                tags: ['Taze Meyve', 'Premium Krema', 'Hafif']
            },
            {
                id: 3,
                name: 'Klasik Vanilyalı Rüya',
                vendor: 'Bursa Pasta Atölyesi',
                rating: '4.7',
                city: 'bursa',
                price: 680,
                description: 'Bourbon vanilyası ile hazırlanan klasik pasta. El yapımı pandispanya ve özel krema karışımı ile benzersiz bir lezzet.',
                minPerson: 4,
                flavor: 'Vanilya',
                coating: 'Krema',
                tags: ['Bourbon Vanilya', 'El Yapımı', 'Klasik']
            },
            {
                id: 4,
                name: 'Muz Karamel Sensation',
                vendor: 'Antalya Patisserie',
                rating: '4.9',
                city: 'antalya',
                price: 820,
                description: 'Organik muz ve ev yapımı karamel ile hazırlanan özel pasta. Toffee krema ve çıtır detaylarla servisi.',
                minPerson: 4,
                flavor: 'Muz',
                coating: 'Toffee',
                tags: ['Organik Muz', 'Ev Yapımı', 'Toffee']
            },
            {
                id: 5,
                name: 'Berry Explosion Mix',
                vendor: 'İzmir Cake Studio',
                rating: '4.8',
                city: 'izmir',
                price: 890,
                description: 'Çilek, ahududu ve yaban mersini karışımı ile hazırlanan özel pasta. Taze meyveler ve hafif kreması ile yaz sezonunun favorisi.',
                minPerson: 4,
                flavor: 'Karışık Meyve',
                coating: 'Krema',
                tags: ['Çilek', 'Ahududu', 'Yaban Mersini', 'Taze']
            },
            {
                id: 6,
                name: 'Frambuazlı Klasik',
                vendor: 'Adana Lezzet Evi',
                rating: '4.6',
                city: 'adana',
                price: 780,
                description: 'Frambuaz püresi ve hafif krema ile hazırlanan zarif pasta. Taze frambuazlarla süslenen özel tasarım.',
                minPerson: 4,
                flavor: 'Frambuaz',
                coating: 'Krema',
                tags: ['Frambuaz Püresi', 'Hafif', 'Zarif']
            }
        ];

        let cart = [];
        let selectedCity = '';

        function render() {
            let filtered = selectedCity 
                ? products.filter(p => p.city === selectedCity)
                : products;

            document.getElementById('grid').innerHTML = filtered.map(p => `
                <div class="card">
                    <div class="card-header">
                        <div class="vendor">${p.vendor}</div>
                        <div class="rating">⭐ ${p.rating}</div>
                    </div>
                    
                    <h3>${p.name}</h3>
                    
                    <p class="description">${p.description}</p>
                    
                    <div class="specs">
                        <div class="spec">
                            <span class="spec-label">Min. Kişi</span>
                            <span class="spec-value">${p.minPerson} Kişi</span>
                        </div>
                        <div class="spec">
                            <span class="spec-label">Lezzet</span>
                            <span class="spec-value">${p.flavor}</span>
                        </div>
                        <div class="spec">
                            <span class="spec-label">Kaplama</span>
                            <span class="spec-value">${p.coating}</span>
                        </div>
                        <div class="spec">
                            <span class="spec-label">Hazırlık</span>
                            <span class="spec-value">2-3 Saat</span>
                        </div>
                    </div>
                    
                    <div class="tags">
                        ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                    
                    <div class="card-footer">
                        <div class="price-section">
                            <div class="price-label">Başlangıç fiyatı</div>
                            <div class="price">₺${p.price}</div>
                        </div>
                        <div class="actions">
                            <button class="btn btn-secondary">✏️ Düzenle</button>
                            <button class="btn btn-add" onclick="addToCart(${p.id})">Sepete Ekle</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            cart.push(id);
            document.getElementById('count').textContent = cart.length;
            alert('✅ Ürün sepete eklendi!');
        }

        function filter() {
            selectedCity = document.getElementById('city').value;
            render();
        }

        function openStudio() {
            const path = window.location.pathname.split('/')[1];
            window.open(`/${path}/cake-studio.html`, '_blank');
        }

        render();
    </script>
</body>
</html>
