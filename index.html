<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saray Patisserie | Professional Cake Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        :root {
            --black: #0F0E0C;
            --gold: #D4AF37;
            --white: #F5F5F5;
            --dark-gray: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; outline: none; }
        body { margin: 0; background-color: var(--black); color: var(--white); font-family: 'Montserrat', sans-serif; overflow: hidden; }

        /* Header */
        header {
            height: 70px;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(15, 14, 12, 0.98);
            z-index: 1000;
        }

        .logo { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); letter-spacing: 3px; }
        .btn-auth { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 20px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; }

        /* Layout */
        .studio-wrapper {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            height: calc(100vh - 70px);
        }

        /* Sidebars */
        .sidebar {
            background: var(--dark-gray);
            border-right: 0.5px solid rgba(255,255,255,0.1);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .tool-title { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 18px; margin-bottom: 15px; border-left: 3px solid var(--gold); padding-left: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; text-transform: uppercase; color: #888; }
        
        input[type="text"], select {
            background: #252525; border: 1px solid #444; color: white; padding: 12px; border-radius: 4px;
        }

        .btn-action { background: var(--gold); color: var(--black); border: none; padding: 14px; border-radius: 4px; font-weight: 700; cursor: pointer; }

        /* Main Area */
        .main-stage {
            position: relative;
            background: radial-gradient(circle, #222 0%, #0f0e0c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas-holder {
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            border: 2px solid var(--gold);
            border-radius: 50%;
            overflow: hidden;
            width: 450px;
            height: 450px;
            background: #fff;
        }

        /* 3D Overlay */
        #three-preview {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--black);
            display: none;
            z-index: 100;
        }

        .btn-preview-toggle {
            position: absolute;
            bottom: 40px;
            background: #fff;
            color: #000;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            z-index: 200;
            border: none;
        }

        /* Right Summary */
        .summary-bar {
            background: var(--dark-gray);
            border-left: 0.5px solid rgba(255,255,255,0.1);
            padding: 25px;
        }

        .price { font-size: 36px; color: var(--gold); margin: 20px 0; font-family: 'Playfair Display', serif; }
    </style>
</head>
<body>

<header>
    <div class="logo">SARAY PATISSERIE</div>
    <div class="nav-right">
        <span style="font-size: 12px; color: var(--gold); margin-right: 20px;">📍 BURSA</span>
        <button class="btn-auth">GİRİŞ YAP</button>
    </div>
</header>

<main class="studio-wrapper">
    <aside class="sidebar">
        <div class="tool-title">EDİTÖR</div>
        <div class="input-group">
            <label>Pasta Mesajı</label>
            <input type="text" id="cake-input" placeholder="İsim yazın..." onkeyup="updateText(this.value)">
        </div>
        <div class="input-group">
            <label>Font Seçimi</label>
            <select id="font-family" onchange="updateFont(this.value)">
                <option value="Playfair Display">Lüks Klasik</option>
                <option value="Dancing Script">Zarif El Yazısı</option>
                <option value="Montserrat">Modern Minimal</option>
            </select>
        </div>
        <div class="input-group">
            <label>Görsel Yükle</label>
            <input type="file" id="img-loader" accept="image/*">
        </div>
    </aside>

    <section class="main-stage">
        <div id="canvas-holder">
            <canvas id="main-canvas" width="450" height="450"></canvas>
        </div>
        <button class="btn-preview-toggle" onclick="toggle3D()">👁️ 360° ÖNİZLEME</button>
        <div id="three-preview">
            <button onclick="toggle3D()" style="position:absolute; top:30px; right:30px; z-index:200; background:var(--gold); border:none; padding:10px 20px; cursor:pointer;">← GERİ DÖN</button>
        </div>
    </section>

    <aside class="summary-bar">
        <div class="tool-title">ÖZET</div>
        <p style="font-size: 12px; color: #888;">Satıcı: Saray Bursa</p>
        <div class="price">₺3.450</div>
        <button class="btn-action" style="width:100%" onclick="alert('Sepete Eklendi!')">SEPETE EKLE</button>
    </aside>
</main>

<script>
    // 2D Tasarım (Fabric.js)
    const canvas = new fabric.Canvas('main-canvas');
    let cakeText;

    // Gerçekçi Pasta Fotoğrafı (Top-View)
    fabric.Image.fromURL('https://images.unsplash.com/photo-1578985545062-69928b1d9587?q=80&w=500&h=500&auto=format&fit=crop', function(img) {
        img.set({ selectable: false, evented: false });
        canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
        cakeText = new fabric.IText('İsim Yazın', {
            left: 225, top: 225, fontFamily: 'Playfair Display', fill: '#D4AF37', fontSize: 40, originX: 'center', originY: 'center'
        });
        canvas.add(cakeText);
    });

    function updateText(val) { if(cakeText) { cakeText.set('text', val || 'İsim Yazın'); canvas.renderAll(); } }
    function updateFont(font) { if(cakeText) { cakeText.set('fontFamily', font); canvas.renderAll(); } }

    document.getElementById('img-loader').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            fabric.Image.fromURL(event.target.result, function(img) {
                img.scaleToWidth(120);
                canvas.add(img);
                canvas.centerObject(img);
            });
        }
        reader.readAsDataURL(e.target.files[0]);
    };

    // 3D Önizleme (Three.js)
    let scene, camera, renderer, cake3D;
    let is3D = false;

    function init3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 640) / (window.innerHeight - 70), 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 640, window.innerHeight - 70);
        document.getElementById('three-preview').appendChild(renderer.domElement);

        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
        scene.add(light);

        const geometry = new THREE.CylinderGeometry(2, 2, 1.2, 64);
        const material = new THREE.MeshPhysicalMaterial({ color: 0x2b1d0e, roughness: 0.2, clearcoat: 1.0 });
        cake3D = new THREE.Mesh(geometry, material);
        scene.add(cake3D);
        camera.position.set(0, 3, 5); camera.lookAt(0,0,0);
        animate();
    }

    function animate() { requestAnimationFrame(animate); if(cake3D) cake3D.rotation.y += 0.005; renderer.render(scene, camera); }

    function toggle3D() {
        const preview = document.getElementById('three-preview');
        is3D = !is3D;
        if(is3D) {
            preview.style.display = 'block';
            if(!scene) init3D();
            const texture = new THREE.CanvasTexture(canvas.getElement());
            cake3D.material.map = texture; cake3D.material.needsUpdate = true;
        } else { preview.style.display = 'none'; }
    }
</script>
</body>
</html>
