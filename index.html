<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saray Patisserie</title>
  <meta name="description" content="81 ilde lüks butik pasta marketplace deneyimi." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: 30 8% 4%;
      --foreground: 40 20% 96%;
      --card: 240 4% 8%;
      --card-foreground: 40 20% 96%;
      --primary: 43 52% 53%;
      --primary-foreground: 30 8% 4%;
      --secondary: 240 4% 12%;
      --secondary-foreground: 40 20% 96%;
      --muted: 240 4% 16%;
      --muted-foreground: 40 10% 55%;
      --border: 40 20% 96% / 0.08;
      --radius: 18px;
      --shadow-luxury: 0 10px 30px -10px rgba(0,0,0,.5), 0 4px 10px -5px rgba(0,0,0,.7);
      --shadow-gold: 0 4px 20px -4px rgba(212,175,55,.15);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      scrollbar-width: none;
    }

    *::-webkit-scrollbar { display: none; }

    html, body {
      margin: 0;
      padding: 0;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      font-family: "Montserrat", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, hsl(43 52% 53% / 0.08), transparent 25%),
        linear-gradient(180deg, hsl(var(--background)), hsl(240 4% 6%));
    }

    h1, h2, h3, h4 {
      font-family: "Playfair Display", serif;
      letter-spacing: -0.03em;
      line-height: 0.95;
      margin: 0;
    }

    p { margin: 0; }

    .hidden { display: none !important; }

    .app {
      min-height: 100vh;
      padding-bottom: 90px;
    }

    .container {
      width: min(100%, 1100px);
      margin: 0 auto;
    }

    .label-text {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: hsl(var(--muted-foreground));
    }

    .text-gold-gradient {
      background: linear-gradient(135deg, hsl(43 52% 53%), hsl(43 60% 65%));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
    }

    .saray-card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow-luxury);
    }

    .glass {
      background: rgba(10,10,11,.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .btn {
      border: 0;
      cursor: pointer;
      transition: transform .18s ease, background-color .18s ease, border-color .18s ease, color .18s ease, opacity .18s ease;
    }

    .btn:active { transform: scale(.97); }

    .btn-primary {
      background: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
      padding: 13px 20px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      box-shadow: var(--shadow-gold);
    }

    .section-title {
      font-size: 26px;
      margin-bottom: 6px;
    }

    .muted {
      color: hsl(var(--muted-foreground));
    }

    .hero-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 10px;
    }

    .location-btn {
      display: flex;
      gap: 10px;
      align-items: center;
      background: transparent;
      color: inherit;
      padding: 0;
    }

    .pin {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: hsl(var(--primary) / 0.12);
      color: hsl(var(--primary));
      flex-shrink: 0;
      font-size: 14px;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: hsl(var(--secondary));
      border: 1px solid hsl(var(--border));
      color: hsl(var(--primary));
      font-family: "Playfair Display", serif;
      font-style: italic;
      font-size: 14px;
    }

    .hero-card {
      margin: 0 20px;
      border-radius: 22px;
      overflow: hidden;
      position: relative;
      aspect-ratio: 16 / 10;
      box-shadow: var(--shadow-luxury);
      background: hsl(var(--secondary));
    }

    .hero-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, hsl(var(--background)), hsl(var(--background) / .38), transparent);
    }

    .hero-content {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 24px;
    }

    .hero-content h1 {
      font-size: clamp(32px, 7vw, 58px);
      font-style: italic;
      margin-top: 8px;
      line-height: .95;
    }

    .section {
      margin-top: 30px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      margin-bottom: 14px;
      gap: 16px;
    }

    .section-link {
      color: hsl(var(--primary));
      text-transform: uppercase;
      letter-spacing: .1em;
      font-size: 12px;
      font-weight: 700;
    }

    .featured-row {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      padding: 0 20px 4px;
      scroll-snap-type: x mandatory;
    }

    .hero-product {
      min-width: min(86vw, 390px);
      scroll-snap-align: center;
    }

    .hero-product-media {
      position: relative;
      aspect-ratio: 4/5;
      overflow: hidden;
    }

    .hero-product-media img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .hero-product-media::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, hsl(var(--card)), transparent 55%);
    }

    .badge {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 2;
      padding: 8px 12px;
      border-radius: 999px;
      background: hsl(var(--primary) / .92);
      color: hsl(var(--primary-foreground));
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .11em;
    }

    .card-body {
      padding: 16px;
    }

    .card-title {
      font-size: 22px;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      line-height: 1.5;
      margin-bottom: 12px;
      min-height: 38px;
    }

    .meta-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 12px;
      color: hsl(var(--muted-foreground));
      margin-bottom: 16px;
    }

    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: end;
    }

    .vendor {
      font-size: 12px;
      color: hsl(var(--muted-foreground));
      margin-bottom: 4px;
    }

    .price {
      font-family: "Playfair Display", serif;
      color: hsl(var(--primary));
      font-size: 28px;
    }

    .category-bar {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 0 20px 16px;
      margin-top: 10px;
    }

    .category-btn {
      white-space: nowrap;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid hsl(var(--border));
      background: hsl(var(--secondary));
      color: hsl(var(--muted-foreground));
      font-size: 13px;
      font-weight: 600;
    }

    .category-btn.active {
      background: hsl(var(--primary) / .10);
      color: hsl(var(--primary));
      border-color: hsl(var(--primary) / .35);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 14px;
      padding: 0 20px;
    }

    .grid-card .media {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
    }

    .grid-card .media img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .grid-card .media::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, hsl(var(--card)), transparent 60%);
    }

    .rating-pill {
      position: absolute;
      top: 10px;
      right: 10px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(0,0,0,.42);
      color: hsl(var(--foreground));
      font-size: 11px;
      z-index: 2;
      backdrop-filter: blur(8px);
    }

    .grid-card .card-body {
      padding: 14px;
    }

    .grid-card .card-title {
      font-size: 17px;
      line-height: 1.1;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .grid-bottom {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-size: 11px;
      color: hsl(var(--muted-foreground));
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 74px;
      z-index: 30;
      border-top: 1px solid hsl(var(--primary) / .18);
    }

    .bottom-nav-inner {
      height: 100%;
      width: min(100%, 540px);
      margin: 0 auto;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 4px;
    }

    .nav-btn {
      position: relative;
      background: transparent;
      color: hsl(var(--muted-foreground));
      min-width: 58px;
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .nav-btn .icon {
      font-size: 18px;
      line-height: 1;
    }

    .nav-btn.active {
      color: hsl(var(--primary));
      font-weight: 700;
    }

    .nav-btn.active::before {
      content: "";
      position: absolute;
      top: -2px;
      width: 30px;
      height: 2px;
      border-radius: 999px;
      background: hsl(var(--primary));
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      background: hsl(var(--background));
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .overlay-brand {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      text-align: center;
      padding: 20px;
    }

    .overlay-brand h2 {
      font-size: clamp(54px, 12vw, 110px);
      font-style: italic;
      margin-bottom: 10px;
    }

    .sheet {
      position: relative;
      width: min(100%, 560px);
      max-height: 72vh;
      background: hsl(var(--secondary));
      border-top: 1px solid hsl(var(--primary) / .25);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      padding: 22px 18px 26px;
      box-shadow: 0 -20px 40px rgba(0,0,0,.35);
      display: flex;
      flex-direction: column;
    }

    .sheet-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .sheet-title {
      font-size: 26px;
    }

    .sheet-change {
      margin-left: auto;
      background: transparent;
      color: hsl(var(--primary));
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: 11px;
      font-weight: 700;
    }

    .search-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .search-wrap input {
      width: 100%;
      border: 1px solid hsl(var(--border));
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      border-radius: 14px;
      padding: 14px 14px 14px 42px;
      outline: none;
      font-size: 14px;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: hsl(var(--muted-foreground));
      font-size: 14px;
    }

    .sheet-list {
      overflow: auto;
      padding: 2px;
    }

    .city-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
    }

    .location-option {
      text-align: left;
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      background: hsl(var(--background) / .55);
      border: 1px solid hsl(var(--border));
      color: hsl(var(--foreground));
      font-size: 14px;
    }

    .district-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .district-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .arrow {
      color: hsl(var(--muted-foreground));
      font-size: 16px;
    }

    .empty {
      padding: 18px;
      border-radius: 14px;
      border: 1px dashed hsl(var(--border));
      color: hsl(var(--muted-foreground));
      text-align: center;
      font-size: 14px;
      background: hsl(var(--background) / .35);
    }

    @media (min-width: 768px) {
      .hero-topbar,
      .section-head,
      .category-bar,
      .grid,
      .featured-row {
        padding-left: 28px;
        padding-right: 28px;
      }

      .hero-card {
        margin-left: 28px;
        margin-right: 28px;
      }

      .grid {
        grid-template-columns: repeat(3, minmax(0,1fr));
      }
    }

    @media (prefers-reduced-motion: no-preference) {
      .hero-card,
      .saray-card,
      .sheet,
      .location-option,
      .category-btn,
      .nav-btn,
      .btn-primary {
        animation: fadeUp .45s ease both;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to { opacity: 1; transform: translateY(0); }
      }
    }
  </style>
</head>

      </div>

      <div class="search-wrap">
        <span class="search-icon">⌕</span>

        </div>

        <div class="hero-card">

            <p class="label-text" style="color:hsl(var(--primary));">Saray Approved</p>

        </div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2 class="section-title">Öne Çıkanlar</h2>
          <span class="section-link">Tümünü Gör</span>
        </div>
        <div id="featuredRow" class="featured-row"></div>
      </section>

      <section class="section">
        <div class="section-head" style="display:block;">
          <h2 class="section-title">Master Pâtissiers</h2>
          <p class="muted" style="font-size:14px; margin-top:8px;">Saray onaylı zanaatkârlardan seçmeler</p>
        </div>
        <div id="categoryBar" class="category-bar"></div>
        <div id="productGrid" class="grid"></div>
      </section>
    </div>
  </main>

  <nav class="bottom-nav glass">
    <div id="bottomNav" class="bottom-nav-inner"></div>
  </nav>

      { id: "studio", label: "Stüdyo", icon: "✎" },
      { id: "orders", label: "Siparişler", icon: "◫" },
      { id: "account", label: "Hesap", icon: "◎" }
    ];

    const state = {
      step: "city",
      selectedCity: "",
      location: null,
      activeCategory: "Tümü",
      activeTab: "home"
    };

    const overlay = document.getElementById("locationOverlay");
    const mainApp = document.getElementById("mainApp");
    const sheetTitle = document.getElementById("sheetTitle");
    const sheetSubtitle = document.getElementById("sheetSubtitle");
    const changeCityBtn = document.getElementById("changeCityBtn");
    const searchInput = document.getElementById("searchInput");
    const sheetList = document.getElementById("sheetList");
    const currentLocation = document.getElementById("currentLocation");
    const categoryBar = document.getElementById("categoryBar");
    const productGrid = document.getElementById("productGrid");
    const featuredRow = document.getElementById("featuredRow");
    const bottomNav = document.getElementById("bottomNav");

    document.getElementById("openLocationBtn").addEventListener("click", () => {
      overlay.classList.remove("hidden");
    });

    changeCityBtn.addEventListener("click", () => {
      state.step = "city";
      state.selectedCity = "";
      searchInput.value = "";
      renderLocationPicker();
    });

    searchInput.addEventListener("input", renderLocationPicker);

    function getDistricts(city) {
      return districts[city] || ["Merkez", "Yeni Mahalle", "Cumhuriyet"];
    }

    function formatPrice(value) {
      return "₺" + value.toLocaleString("tr-TR");
    }

    function imageTag(src, alt) {
      return `<img src="${src}" alt="${alt}" onerror="this.src='./public/placeholder.svg'">`;
    }

    function renderLocationPicker() {
      const q = searchInput.value.trim().toLocaleLowerCase("tr-TR");

      if (state.step === "city") {
        sheetTitle.textContent = "Şehrinizi Seçin";
        sheetSubtitle.textContent = "81 ilden teslimat";
        searchInput.placeholder = "Şehir ara...";
        changeCityBtn.classList.add("hidden");

        const filteredCities = cities.filter(city =>
          city.toLocaleLowerCase("tr-TR").includes(q)
        );

        sheetList.innerHTML = filteredCities.length
          ? `<div class="city-grid">
              ${filteredCities.map(city => `
                <button class="btn location-option" onclick="selectCity('${city.replace(/'/g, "\\'")}')">${city}</button>
              `).join("")}
            </div>`
          : `<div class="empty">Şehir bulunamadı.</div>`;
      } else {
        sheetTitle.textContent = state.selectedCity;
        sheetSubtitle.textContent = "İlçe seçin";
        searchInput.placeholder = "İlçe ara...";
        changeCityBtn.classList.remove("hidden");

        const filteredDistricts = getDistricts(state.selectedCity).filter(district =>
          district.toLocaleLowerCase("tr-TR").includes(q)
        );

        sheetList.innerHTML = filteredDistricts.length
          ? `<div class="district-list">
              ${filteredDistricts.map(district => `
                <button class="btn location-option district-row" onclick="selectDistrict('${district.replace(/'/g, "\\'")}')">
                  <span>${district}</span>
                  <span class="arrow">›</span>
                </button>
              `).join("")}
            </div>`
          : `<div class="empty">İlçe bulunamadı.</div>`;
      }
    }

    function selectCity(city) {
      state.selectedCity = city;
      state.step = "district";
      searchInput.value = "";
      renderLocationPicker();
    }

    function selectDistrict(district) {
      state.location = { city: state.selectedCity, district };
      currentLocation.textContent = `${district}, ${state.selectedCity}`;
      overlay.classList.add("hidden");
      mainApp.classList.remove("hidden");
    }

    window.selectCity = selectCity;
    window.selectDistrict = selectDistrict;

    function renderFeatured() {
      const featured = products.filter(p => p.featured);
      featuredRow.innerHTML = featured.map(product => `
        <article class="saray-card hero-product">
          <div class="hero-product-media">
            ${imageTag(product.image, product.name)}
            <span class="badge">${product.category}</span>
          </div>
          <div class="card-body">
            <h3 class="card-title">${product.name}</h3>
            <p class="card-desc">${product.description}</p>
            <div class="meta-row">
              <span class="meta-chip">★ ${product.vendorRating}</span>
              <span class="meta-chip">◷ ${product.deliveryTime}</span>
              <span class="meta-chip">👥 Min ${product.minPersons} kişi</span>
            </div>
            <div class="price-row">
              <div>
                <p class="vendor">${product.vendor}</p>
                <p class="price">${formatPrice(product.price)}</p>
              </div>
              <button class="btn btn-primary">Sipariş Ver</button>
            </div>
          </div>
        </article>
      `).join("");
    }

    function renderCategories() {
      categoryBar.innerHTML = categories.map(category => `
        <button class="btn category-btn ${state.activeCategory === category ? "active" : ""}" onclick="setCategory('${category.replace(/'/g, "\\'")}')">
          ${category}
        </button>
      `).join("");
    }

    function renderProducts() {
      const filtered = state.activeCategory === "Tümü"
        ? products
        : products.filter(p => p.category === state.activeCategory);

      productGrid.innerHTML = filtered.map(product => `
        <article class="saray-card grid-card">
          <div class="media">
            ${imageTag(product.image, product.name)}
            <div class="rating-pill">★ ${product.vendorRating}</div>
          </div>
          <div class="card-body">
            <h3 class="card-title">${product.name}</h3>
            <p class="vendor">${product.vendor}</p>
            <div class="grid-bottom">
              <strong class="price" style="font-size:22px;">${formatPrice(product.price)}</strong>
              <span>◷ ${product.deliveryTime}</span>
            </div>
          </div>
        </article>
      `).join("");
    }

    function setCategory(category) {
      state.activeCategory = category;
      renderCategories();
      renderProducts();
    }

    window.setCategory = setCategory;

    function renderTabs() {
      bottomNav.innerHTML = tabs.map(tab => `
        <button class="btn nav-btn ${state.activeTab === tab.id ? "active" : ""}" onclick="setTab('${tab.id}')">
          <span class="icon">${tab.icon}</span>
          <span>${tab.label}</span>
        </button>
      `).join("");
    }

    function setTab(tabId) {
      state.activeTab = tabId;
      renderTabs();
    }

    window.setTab = setTab;

    renderLocationPicker();
    renderFeatured();
    renderCategories();
    renderProducts();
    renderTabs();
  </script>
</body>
</html>
