<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cake Studio — SARAY</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;800&family=Montserrat:wght@300;400;500;600;700;800&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --black: #0F0E0C;
            --gold: #D4AF37;
            --white: #FCFBF8;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--black);
            color: var(--white);
            overflow: hidden;
            height: 100vh;
        }
        .top {
            height: 70px;
            background: rgba(15, 14, 12, 0.98);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            border-bottom: 0.5px solid rgba(212, 175, 55, 0.3);
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #D4AF37, #F4E5A1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge {
            background: rgba(212, 175, 55, 0.05);
            border: 0.5px solid rgba(212, 175, 55, 0.3);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            color: #4CAF50;
        }
        button {
            background: rgba(212, 175, 55, 0.05);
            border: 0.5px solid rgba(212, 175, 55, 0.3);
            color: var(--white);
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
        }
        .btn-3d {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
        }
        .layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            height: calc(100vh - 70px);
        }
        .panel {
            background: var(--black);
            border-right: 0.5px solid rgba(212, 175, 55, 0.3);
            overflow-y: auto;
            padding: 24px;
        }
        .section {
            margin-bottom: 32px;
        }
        .section-title {
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 16px;
            color: var(--gold);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .opt {
            background: rgba(212, 175, 55, 0.05);
            border: 1.5px solid rgba(212, 175, 55, 0.2);
            padding: 16px;
            border-radius: 14px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }
        .opt.active {
            background: var(--gold);
            color: var(--black);
        }
        .colors {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        .color {
            aspect-ratio: 1;
            border-radius: 12px;
            cursor: pointer;
            border: 3px solid transparent;
        }
        .color.active {
            border-color: var(--gold);
        }
        input, select {
            width: 100%;
            background: rgba(212, 175, 55, 0.05);
            border: 0.5px solid rgba(212, 175, 55, 0.3);
            color: var(--white);
            padding: 14px 16px;
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            margin-top: 8px;
        }
        .canvas-area {
            background: linear-gradient(135deg, #1a1918 0%, #0F0E0C 100%);
            position: relative;
        }
        #canvas2D, #canvas3D {
            width: 100%;
            height: 100%;
            display: none;
        }
        #canvas2D.active, #canvas3D.active {
            display: block;
        }
        .overlay {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 14, 12, 0.95);
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 13px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="top">
        <div class="logo">SARAY</div>
        <div class="badge" id="mode">🎨 Tasarım Modu</div>
        <button class="btn-3d" onclick="toggle3D()">👁️ 3D Önizle</button>
    </div>

    <div class="layout">
        <div class="panel">
            <div class="section">
                <div class="section-title">🎂 Kat Sayısı</div>
                <div class="grid">
                    <div class="opt active" onclick="setTiers(1)">1 Kat</div>
                    <div class="opt" onclick="setTiers(2)">2 Kat</div>
                    <div class="opt" onclick="setTiers(3)">3 Kat</div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">👥 Kişi Sayısı</div>
                <select id="size" onchange="draw()">
                    <option value="4">4 Kişi</option>
                    <option value="6">6 Kişi</option>
                    <option value="8">8 Kişi</option>
                    <option value="10">10 Kişi</option>
                    <option value="12">12 Kişi</option>
                    <option value="16">16 Kişi</option>
                    <option value="20">20 Kişi</option>
                </select>
            </div>

            <div class="section">
                <div class="section-title">🎨 Renk</div>
                <div class="colors">
                    <div class="color active" style="background:#FFF; border:1px solid #ccc" onclick="setColor('#FFF')"></div>
                    <div class="color" style="background:#FFB6C1" onclick="setColor('#FFB6C1')"></div>
                    <div class="color" style="background:#D4AF37" onclick="setColor('#D4AF37')"></div>
                    <div class="color" style="background:#8B4513" onclick="setColor('#8B4513')"></div>
                    <div class="color" style="background:#87CEEB" onclick="setColor('#87CEEB')"></div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">✍️ Yazı</div>
                <input type="text" id="text" placeholder="İyi ki doğdun..." oninput="draw()">
            </div>
        </div>

        <div class="canvas-area">
            <canvas id="canvas2D" class="active" width="800" height="800"></canvas>
            <canvas id="canvas3D"></canvas>
            <div class="overlay" id="hint">🎨 Üstten görünüm — Tasarımınızı yapın</div>
        </div>
    </div>

    <script>
        let state = {mode:'2d', tiers:1, color:'#FFFFFF', text:''};
        let canvas2D, ctx, canvas3D, scene, camera, renderer, controls;

        window.onload = () => {
            canvas2D = document.getElementById('canvas2D');
            ctx = canvas2D.getContext('2d');
            canvas3D = document.getElementById('canvas3D');
            init3D();
            draw();
        };

        function draw() {
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, 800, 800);

            const cx = 400, cy = 400, r = 250;

            // Pasta
            ctx.fillStyle = state.color;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();

            // Kenar
            ctx.strokeStyle = '#D4AF37';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.stroke();

            // Yazı
            if(state.text) {
                ctx.fillStyle = '#D4AF37';
                ctx.font = '48px "Dancing Script"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(state.text, cx, cy);
            }
        }

        function setTiers(t) {
            state.tiers = t;
            document.querySelectorAll('.opt').forEach(o => o.classList.remove('active'));
            event.target.classList.add('active');
        }

        function setColor(c) {
            state.color = c;
            document.querySelectorAll('.color').forEach(o => o.classList.remove('active'));
            event.target.classList.add('active');
            draw();
        }

        function toggle3D() {
            if(state.mode === '2d') {
                state.mode = '3d';
                canvas2D.classList.remove('active');
                canvas3D.classList.add('active');
                document.getElementById('mode').textContent = '👁️ 3D Önizleme';
                document.getElementById('hint').textContent = '🖱️ Sürükle & Döndür';
                create3D();
            } else {
                state.mode = '2d';
                canvas3D.classList.remove('active');
                canvas2D.classList.add('active');
                document.getElementById('mode').textContent = '🎨 Tasarım Modu';
                document.getElementById('hint').textContent = '🎨 Üstten görünüm';
            }
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0F0E0C);
            camera = new THREE.PerspectiveCamera(45, canvas3D.parentElement.clientWidth / canvas3D.parentElement.clientHeight, 0.1, 1000);
            camera.position.set(0, 6, 10);
            renderer = new THREE.WebGLRenderer({canvas: canvas3D, antialias: true});
            renderer.setSize(canvas3D.parentElement.clientWidth, canvas3D.parentElement.clientHeight);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const light = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(light);
            const dir = new THREE.DirectionalLight(0xffffff, 0.8);
            dir.position.set(5, 10, 5);
            scene.add(dir);

            animate();
        }

        function create3D() {
            scene.children.slice(2).forEach(c => scene.remove(c));

            const heights = {1:[1], 2:[0.8,0.6], 3:[0.8,0.6,0.5]};
            const sizes = {1:[2.5], 2:[2.5,1.8], 3:[2.5,1.8,1.2]};
            let y = 0;

            heights[state.tiers].forEach((h, i) => {
                const geo = new THREE.CylinderGeometry(sizes[state.tiers][i], sizes[state.tiers][i], h, 32);
                const mat = new THREE.MeshPhysicalMaterial({
                    color: new THREE.Color(state.color),
                    clearcoat: 0.5,
                    roughness: 0.4
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = y + h/2;
                scene.add(mesh);
                y += h;
            });

            state.text = document.getElementById('text').value;
            if(state.text) {
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = 512;
                canvas.height = 512;
                context.fillStyle = '#D4AF37';
                context.font = 'bold 64px "Dancing Script"';
                context.textAlign = 'center';
                context.fillText(state.text, 256, 256);
                const texture = new THREE.CanvasTexture(canvas);
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: texture}));
                sprite.position.y = y + 0.5;
                sprite.scale.set(4, 4, 1);
                scene.add(sprite);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
