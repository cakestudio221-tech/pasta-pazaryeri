<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cake Designer — SARAY PATİSSERİE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;800&family=Montserrat:wght@300;400;500;600;700;800&family=Dancing+Script:wght@400;700&family=Great+Vibes&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --black: #0F0E0C; --gold: #D4AF37; --white: #FCFBF8; }
        body { font-family: 'Montserrat', sans-serif; background: var(--black); color: var(--white); overflow: hidden; height: 100vh; }
        
        .top { height: 80px; background: rgba(15, 14, 12, 0.98); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 1px solid rgba(212, 175, 55, 0.3); }
        .logo { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 800; background: linear-gradient(135deg, #D4AF37, #F4E5A1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge { background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212, 175, 55, 0.3); padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 700; }
        .badge.design { color: #4CAF50; }
        .badge.preview { color: var(--gold); }
        button { background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212, 175, 55, 0.3); color: var(--white); padding: 12px 28px; border-radius: 8px; cursor: pointer; font-weight: 700; transition: all 0.3s; }
        .btn-3d { background: linear-gradient(135deg, #4CAF50, #45a049); color: white; border: none; }
        
        .layout { display: grid; grid-template-columns: 380px 1fr; height: calc(100vh - 80px); }
        .panel { background: var(--black); border-right: 1px solid rgba(212, 175, 55, 0.3); overflow-y: auto; padding: 32px; }
        .section { margin-bottom: 40px; }
        .section-title { font-size: 14px; font-weight: 800; margin-bottom: 20px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .opt { background: rgba(212, 175, 55, 0.05); border: 2px solid rgba(212, 175, 55, 0.2); padding: 20px 12px; border-radius: 12px; text-align: center; cursor: pointer; font-weight: 700; font-size: 13px; transition: all 0.3s; }
        .opt.active { background: var(--gold); color: var(--black); border-color: var(--gold); }
        
        .base-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .base-opt { background: var(--black); border: 2px solid rgba(212, 175, 55, 0.2); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.3s; }
        .base-opt.active { border-color: var(--gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        .base-opt img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .base-opt .base-name { padding: 12px; text-align: center; font-size: 12px; font-weight: 700; }
        
        .colors { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .color { aspect-ratio: 1; border-radius: 12px; cursor: pointer; border: 3px solid transparent; transition: all 0.3s; }
        .color.active { border-color: var(--gold); transform: scale(1.1); }
        
        input, select { width: 100%; background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212, 175, 55, 0.3); color: var(--white); padding: 14px 18px; border-radius: 8px; font-family: 'Montserrat', sans-serif; margin-top: 10px; }
        
        .canvas-area { background: linear-gradient(135deg, #1a1918 0%, #0F0E0C 100%); position: relative; display: flex; align-items: center; justify-content: center; }
        #canvas2D, #canvas3D { display: none; }
        #canvas2D.active, #canvas3D.active { display: block; }
        
        .hint { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(15, 14, 12, 0.95); backdrop-filter: blur(20px); padding: 16px 36px; border-radius: 50px; font-size: 14px; font-weight: 600; }
        
        .price-box { background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(212, 175, 55, 0.05)); border: 1px solid var(--gold); border-radius: 16px; padding: 20px; text-align: center; margin-top: 24px; }
        .price-label { font-size: 12px; opacity: 0.7; margin-bottom: 8px; }
        .price { font-size: 36px; font-weight: 800; color: var(--gold); }
    </style>
</head>
<body>
    <div class="top">
        <div class="logo">SARAY</div>
        <div class="badge design" id="mode">🎨 2D Tasarım Modu</div>
        <button class="btn-3d" onclick="toggle3D()">👁️ 3D Önizleme</button>
    </div>

    <div class="layout">
        <div class="panel">
            <div class="section">
                <div class="section-title">🎂 Pasta Tabanı</div>
                <div class="base-grid">
                    <div class="base-opt active" onclick="setBase('chocolate')">
                        <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=400&q=80" alt="Çikolata">
                        <div class="base-name">Çikolata</div>
                    </div>
                    <div class="base-opt" onclick="setBase('vanilla')">
                        <img src="https://images.unsplash.com/photo-1588195538326-c5b1e9f80a1b?w=400&q=80" alt="Vanilya">
                        <div class="base-name">Vanilya</div>
                    </div>
                    <div class="base-opt" onclick="setBase('strawberry')">
                        <img src="https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=400&q=80" alt="Çilek">
                        <div class="base-name">Çilek</div>
                    </div>
                    <div class="base-opt" onclick="setBase('caramel')">
                        <img src="https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=400&q=80" alt="Karamel">
                        <div class="base-name">Karamel</div>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">🏗️ Kat Sayısı</div>
                <div class="grid">
                    <div class="opt active" onclick="setTiers(1)">1 Kat</div>
                    <div class="opt" onclick="setTiers(2)">2 Kat</div>
                    <div class="opt" onclick="setTiers(3)">3 Kat</div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">👥 Kişi Sayısı</div>
                <select id="size" onchange="calcPrice()">
                    <option value="4">4 Kişi</option>
                    <option value="6">6 Kişi</option>
                    <option value="8">8 Kişi</option>
                    <option value="10">10 Kişi</option>
                    <option value="12">12 Kişi</option>
                    <option value="16">16 Kişi</option>
                    <option value="20">20 Kişi</option>
                    <option value="30">30+ Kişi</option>
                </select>
            </div>

            <div class="section">
                <div class="section-title">🎨 Yazı Rengi</div>
                <div class="colors">
                    <div class="color active" style="background:#D4AF37" onclick="setTextColor('#D4AF37')"></div>
                    <div class="color" style="background:#FFF" onclick="setTextColor('#FFF')"></div>
                    <div class="color" style="background:#000" onclick="setTextColor('#000')"></div>
                    <div class="color" style="background:#FF1493" onclick="setTextColor('#FF1493')"></div>
                    <div class="color" style="background:#4169E1" onclick="setTextColor('#4169E1')"></div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">✍️ Pasta Yazısı</div>
                <input type="text" id="text" placeholder="İyi ki doğdun..." oninput="draw()">
            </div>

            <div class="section">
                <div class="section-title">🔤 Font Stili</div>
                <select id="font" onchange="draw()">
                    <option value="Dancing Script">Dancing Script</option>
                    <option value="Great Vibes">Great Vibes</option>
                    <option value="Pacifico">Pacifico</option>
                    <option value="Playfair Display">Playfair Display</option>
                </select>
            </div>

            <div class="price-box">
                <div class="price-label">Toplam Tutar</div>
                <div class="price" id="priceDisplay">₺450</div>
            </div>

            <button class="btn-3d" style="width:100%; margin-top:16px;">🛍 Sepete Ekle</button>
        </div>

        <div class="canvas-area">
            <canvas id="canvas2D" class="active" width="1000" height="1000"></canvas>
            <canvas id="canvas3D"></canvas>
            <div class="hint" id="hint">🎨 Gerçek pasta fotoğrafı üzerine tasarım yapın</div>
        </div>
    </div>

    <script>
        const baseImages = {
            chocolate: 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=1200&q=90',
            vanilla: 'https://images.unsplash.com/photo-1588195538326-c5b1e9f80a1b?w=1200&q=90',
            strawberry: 'https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=1200&q=90',
            caramel: 'https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=1200&q=90'
        };

        let state = { 
            mode: '2d', 
            base: 'chocolate', 
            tiers: 1, 
            size: 4,
            textColor: '#D4AF37',
            text: '', 
            font: 'Dancing Script',
            basePrice: 450
        };

        let canvas2D, ctx, canvas3D, scene, camera, renderer, controls;

        window.onload = () => {
            canvas2D = document.getElementById('canvas2D');
            ctx = canvas2D.getContext('2d');
            canvas3D = document.getElementById('canvas3D');
            init3D();
            draw();
            calcPrice();
        };

        function draw() {
            state.text = document.getElementById('text').value;
            state.font = document.getElementById('font').value;

            // Clear
            ctx.fillStyle = '#F5F5F5';
            ctx.fillRect(0, 0, 1000, 1000);

            // Load cake base image
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                const size = 900;
                const x = 50, y = 50;

                // Draw cake photo
                ctx.drawImage(img, x, y, size, size);

                // Text overlay
                if(state.text) {
                    ctx.fillStyle = state.textColor;
                    ctx.font = `bold 80px "${state.font}"`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowBlur = 15;
                    ctx.fillText(state.text, 500, 500);
                }
            };
            img.src = baseImages[state.base];
        }

        function setBase(base) {
            state.base = base;
            document.querySelectorAll('.base-opt').forEach(o => o.classList.remove('active'));
            event.target.closest('.base-opt').classList.add('active');
            draw();
            calcPrice();
        }

        function setTiers(t) {
            state.tiers = t;
            document.querySelectorAll('.opt').forEach(o => o.classList.remove('active'));
            event.target.classList.add('active');
            calcPrice();
        }

        function setTextColor(c) {
            state.textColor = c;
            document.querySelectorAll('.color').forEach(o => o.classList.remove('active'));
            event.target.classList.add('active');
            draw();
        }

        function calcPrice() {
            state.size = parseInt(document.getElementById('size').value);
            let total = state.basePrice * (state.size / 4);
            total += (state.tiers - 1) * 200; // Her ek kat +200
            if(state.text) total += 100;
            document.getElementById('priceDisplay').textContent = `₺${Math.round(total)}`;
        }

        function toggle3D() {
            if(state.mode === '2d') {
                state.mode = '3d';
                canvas2D.classList.remove('active');
                canvas3D.classList.add('active');
                document.getElementById('mode').textContent = '👁️ 3D Önizleme Modu';
                document.getElementById('mode').classList.remove('design');
                document.getElementById('mode').classList.add('preview');
                document.getElementById('hint').textContent = '🖱️ Sürükle & Döndür — Scroll ile Yakınlaştır';
                create3D();
            } else {
                state.mode = '2d';
                canvas3D.classList.remove('active');
                canvas2D.classList.add('active');
                document.getElementById('mode').textContent = '🎨 2D Tasarım Modu';
                document.getElementById('mode').classList.remove('preview');
                document.getElementById('mode').classList.add('design');
                document.getElementById('hint').textContent = '🎨 Gerçek pasta fotoğrafı üzerine tasarım yapın';
            }
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0F0E0C);
            const container = canvas3D.parentElement;
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 6, 10);
            renderer = new THREE.WebGLRenderer({canvas: canvas3D, antialias: true});
            renderer.setSize(container.clientWidth, container.clientHeight);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dir = new THREE.DirectionalLight(0xffffff, 0.8);
            dir.position.set(5, 10, 5);
            scene.add(dir);

            animate();
        }

        function create3D() {
            scene.children.slice(2).forEach(c => scene.remove(c));

            const heights = {1:[1], 2:[0.8,0.6], 3:[0.8,0.6,0.5]};
            const sizes = {1:[2.5], 2:[2.5,1.8], 3:[2.5,1.8,1.2]};
            let y = 0;

            // Use canvas as texture
            const texture = new THREE.CanvasTexture(canvas2D);

            heights[state.tiers].forEach((h, i) => {
                const geo = new THREE.CylinderGeometry(sizes[state.tiers][i], sizes[state.tiers][i], h, 32);
                const mat = new THREE.MeshPhysicalMaterial({
                    map: texture,
                    clearcoat: 0.5,
                    roughness: 0.4,
                    metalness: 0.1
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = y + h/2;
                scene.add(mesh);
                y += h;
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
