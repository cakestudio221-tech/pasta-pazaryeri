<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cake Studio — SARAY PATİSSERİE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;800&family=Montserrat:wght@300;400;500;600;700;800&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --black: #0F0E0C;
            --gold: #D4AF37;
            --white: #FCFBF8;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--black);
            color: var(--white);
            overflow: hidden;
            height: 100vh;
        }
        .top {
            height: 80px;
            background: rgba(15, 14, 12, 0.98);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #D4AF37, #F4E5A1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .mode-badge {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
        }
        .mode-badge.design { color: #4CAF50; }
        .mode-badge.preview { color: var(--gold); }
        button {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--white);
            padding: 12px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-3d {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
        }
        .btn-3d:hover {
            transform: translateY(-2px);
        }
        .layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            height: calc(100vh - 80px);
        }
        .panel {
            background: var(--black);
            border-right: 1px solid rgba(212, 175, 55, 0.3);
            overflow-y: auto;
            padding: 32px;
        }
        .section {
            margin-bottom: 40px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .opt {
            background: rgba(212, 175, 55, 0.05);
            border: 2px solid rgba(212, 175, 55, 0.2);
            padding: 20px 16px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s;
        }
        .opt:hover {
            border-color: var(--gold);
        }
        .opt.active {
            background: var(--gold);
            color: var(--black);
            border-color: var(--gold);
        }
        .colors {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }
        .color {
            aspect-ratio: 1;
            border-radius: 12px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
        }
        .color.active {
            border-color: var(--gold);
            transform: scale(1.1);
        }
        input, select {
            width: 100%;
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--white);
            padding: 14px 18px;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            margin-top: 10px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--gold);
        }
        .canvas-area {
            background: linear-gradient(135deg, #1a1918 0%, #0F0E0C 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #canvas2D, #canvas3D {
            display: none;
        }
        #canvas2D.active, #canvas3D.active {
            display: block;
        }
        .overlay {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 14, 12, 0.95);
            backdrop-filter: blur(20px);
            padding: 16px 36px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="top">
        <div class="logo">SARAY</div>
        <div class="mode-badge design" id="mode">🎨 Tasarım Modu</div>
        <button class="btn-3d" onclick="toggle3D()">👁️ 3D Önizleme</button>
    </div>

    <div class="layout">
        <div class="panel">
            <div class="section">
                <div class="section-title">🎂 Pasta Katları</div>
                <div class="grid">
                    <div class="opt active" onclick="setTiers(1)">1 Kat</div>
                    <div class="opt" onclick="setTiers(2)">2 Kat</div>
                    <div class="opt" onclick="setTiers(3)">3 Kat</div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">👥 Kişi Sayısı</div>
                <select id="size">
                    <option value="4">4 Kişi</option>
                    <option value="6">6 Kişi</option>
                    <option value="8">8 Kişi</option>
                    <option value="10">10 Kişi</option>
                    <option value="12">12 Kişi</option>
                    <option value="16">16 Kişi</option>
                    <option value="20">20 Kişi</option>
                    <option value="30">30+ Kişi</option>
                </select>
            </div>

            <div class="section">
                <div class="section-title">🎨 Kaplama Rengi</div>
                <div class="colors">
                    <div class="color active" style="background:#FFF; border:2px solid #ddd" onclick="setColor('#FFF')"></div>
                    <div class="color" style="background:#FFB6C1" onclick="setColor('#FFB6C1')"></div>
                    <div class="color" style="background:#D4AF37" onclick="setColor('#D4AF37')"></div>
                    <div class="color" style="background:#8B4513" onclick="setColor('#8B4513')"></div>
                    <div class="color" style="background:#87CEEB" onclick="setColor('#87CEEB')"></div>
                    <div class="color" style="background:#E6E6FA" onclick="setColor('#E6E6FA')"></div>
                    <div class="color" style="background:#98FB98" onclick="setColor('#98FB98')"></div>
                    <div class="color" style="background:#FFE4E1" onclick="setColor('#FFE4E1')"></div>
                    <div class="color" style="background:#F0E68C" onclick="setColor('#F0E68C')"></div>
                    <div class="color" style="background:#000" onclick="setColor('#000')"></div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">✍️ Pasta Yazısı</div>
                <input type="text" id="text" placeholder="Örn: İyi ki doğdun..." oninput="draw()">
            </div>

            <div class="section">
                <div class="section-title">🔤 Font Stili</div>
                <select id="font" onchange="draw()">
                    <option value="Dancing Script">Dancing Script</option>
                    <option value="Playfair Display">Playfair Display</option>
                    <option value="Montserrat">Montserrat</option>
                </select>
            </div>
        </div>

        <div class="canvas-area">
            <canvas id="canvas2D" class="active" width="900" height="900"></canvas>
            <canvas id="canvas3D"></canvas>
            <div class="overlay" id="hint">🎨 Üstten görünüm — Pastanızı tasarlayın</div>
        </div>
    </div>

    <script>
        let state = { mode:'2d', tiers:1, color:'#FFFFFF', text:'', font:'Dancing Script' };
        let canvas2D, ctx, canvas3D, scene, camera, renderer, controls;

        window.onload = () => {
            canvas2D = document.getElementById('canvas2D');
            ctx = canvas2D.getContext('2d');
            canvas3D = document.getElementById('canvas3D');
            init3D();
            draw();
        };

        function draw() {
            state.text = document.getElementById('text').value;
            state.font = document.getElementById('font').value;

            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, 900, 900);

            const cx = 450, cy = 450, r = 300;

            // Pasta circle
            ctx.fillStyle = state.color;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();

            // Border
            ctx.strokeStyle = '#D4AF37';
            ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.stroke();

            // Inner circle
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(cx, cy, r * 0.85, 0, Math.PI * 2);
            ctx.stroke();

            // Text
            if(state.text) {
                ctx.fillStyle = '#D4AF37';
                ctx.font = `bold 60px "${state.font}"`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 6;
                ctx.fillText(state.text, cx, cy);
            }
        }

        function setTiers(t) {
            state.tiers = t;
            document.querySelectorAll('.opt').forEach(o => o.classList.remove('active'));
            event.target.classList.add('active');
        }

        function setColor(c) {
            state.color = c;
            document.querySelectorAll('.color').forEach(o => o.classList.remove('active'));
            event.target.classList.add('active');
            draw();
        }

        function toggle3D() {
            if(state.mode === '2d') {
                state.mode = '3d';
                canvas2D.classList.remove('active');
                canvas3D.classList.add('active');
                document.getElementById('mode').textContent = '👁️ 3D Önizleme';
                document.getElementById('mode').classList.remove('design');
                document.getElementById('mode').classList.add('preview');
                document.getElementById('hint').textContent = '🖱️ Sürükle & Döndür — Scroll ile Yakınlaştır';
                create3D();
            } else {
                state.mode = '2d';
                canvas3D.classList.remove('active');
                canvas2D.classList.add('active');
                document.getElementById('mode').textContent = '🎨 Tasarım Modu';
                document.getElementById('mode').classList.remove('preview');
                document.getElementById('mode').classList.add('design');
                document.getElementById('hint').textContent = '🎨 Üstten görünüm';
            }
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0F0E0C);
            const container = canvas3D.parentElement;
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 6, 10);
            renderer = new THREE.WebGLRenderer({canvas: canvas3D, antialias: true});
            renderer.setSize(container.clientWidth, container.clientHeight);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            const dir = new THREE.DirectionalLight(0xffffff, 0.8);
            dir.position.set(5, 10, 5);
            scene.add(dir);

            animate();
        }

        function create3D() {
            scene.children.slice(2).forEach(c => scene.remove(c));

            const heights = {1:[1], 2:[0.8,0.6], 3:[0.8,0.6,0.5]};
            const sizes = {1:[2.5], 2:[2.5,1.8], 3:[2.5,1.8,1.2]};
            let y = 0;

            heights[state.tiers].forEach((h, i) => {
                const geo = new THREE.CylinderGeometry(sizes[state.tiers][i], sizes[state.tiers][i], h, 32);
                const mat = new THREE.MeshPhysicalMaterial({
                    color: new THREE.Color(state.color),
                    clearcoat: 0.5,
                    roughness: 0.4,
                    metalness: 0.1
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = y + h/2;
                mesh.castShadow = true;
                scene.add(mesh);
                y += h;
            });

            if(state.text) {
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = 512;
                canvas.height = 512;
                context.fillStyle = '#D4AF37';
                context.font = `bold 64px "${state.font}"`;
                context.textAlign = 'center';
                context.fillText(state.text, 256, 256);
                const texture = new THREE.CanvasTexture(canvas);
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: texture}));
                sprite.position.y = y + 0.5;
                sprite.scale.set(4, 4, 1);
                scene.add(sprite);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const container = canvas3D.parentElement;
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
